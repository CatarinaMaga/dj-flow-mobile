<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DJ Flow Mobile</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f1012">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body class="mobile-body">
    
    <header class="mobile-header">
        <div class="logo">DJ <span>FLOW</span> MOBILE</div>
        <div class="status-dot"></div>
    </header>

    <main class="mobile-content">
        <!-- BUSCA -->
        <div class="search-section">
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Pesquisar música ou artista..." autocomplete="off">
                <button id="btn-search">🔍</button>
            </div>
        </div>

        <!-- RESULTADOS -->
        <div id="results-container" class="results-grid">
            <!-- Cards serão inseridos aqui pelo JS -->
            <div class="empty-state">
                <p>Encontre a trilha perfeita para o seu set.</p>
            </div>
        </div>
    </main>

    <!-- PLAYER FIXO (Aparece ao clicar em Ouvir) -->
    <div id="player-bar" class="player-bar hidden">
        <div class="player-info">
            <div id="player-title" class="player-title">Tocando agora...</div>
        </div>
        <div class="player-controls">
            <audio id="audio-player" controls></audio>
        </div>
        <button id="btn-close-player">✕</button>
    </div>

    <!-- SCRIPTS -->
    <script src="app.js"></script>
</body>
</html>
